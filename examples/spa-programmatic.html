<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocadesk embed — programmatic mount</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 640px;
      margin: 4rem auto;
      padding: 1rem;
      color: #1a1a2e;
      line-height: 1.55;
    }
    h1 { font-size: 1.5rem; }
    p { color: #555; }
    .demo { margin: 2rem 0; }
  </style>
</head>
<body>
  <h1>Vocadesk embed — programmatic mount</h1>
  <p>Useful from SPA frameworks where the button doesn't exist at page-load time.</p>

  <div class="demo">
    <button id="my-call-btn"
            style="width:220px;height:60px;
                   --vocadesk-bg:#16264f;
                   --vocadesk-accent:#7ee787">
      Speak to support
    </button>
    <button id="destroy-btn" style="margin-left:1rem;height:32px">destroy()</button>
  </div>

  <script src="/dist/vocadesk.min.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const handle = window.Vocadesk.mount("#my-call-btn", {
        embedId: "emb_demo",
        label: "Speak to support",
      });
      document.getElementById("destroy-btn").addEventListener("click", () => {
        handle.destroy();
      });
    });
  </script>
</body>
</html>
