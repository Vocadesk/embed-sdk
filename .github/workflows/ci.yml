name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (production URLs — for bundle size + lint check)
        run: npm run build

      - name: Bundle size check
        run: node scripts/check-size.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Rebuild with the mock-server URLs baked in. The production bundle
      # points at embed.vocadesk.com / voice.vocadesk.com, which the e2e
      # environment can't reach — the test mock server runs on 127.0.0.1.
      - name: Build (mock URLs for e2e)
        env:
          VITE_API_URL: http://127.0.0.1:8799
          VITE_WSS_URL: ws://127.0.0.1:8788/embed/v1/call
        run: npm run build

      - name: E2E tests
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
