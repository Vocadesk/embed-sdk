name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Resolve version from tag
        id: version
        run: |
          # Strip leading "v"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Bake API + WSS URLs into the bundle. If the secrets aren't set, Vite
      # falls back to the production defaults in src/config.ts (https://embed.vocadesk.com).
      # Set these secrets to override (e.g. while DNS is still pointing at raw Cloud Run URLs).
      - name: Build
        env:
          VITE_API_URL: ${{ secrets.SDK_BUILD_API_URL }}
          VITE_WSS_URL: ${{ secrets.SDK_BUILD_WSS_URL }}
        run: npm run build

      - name: Bundle size check
        run: node scripts/check-size.mjs

      - name: Compute SRI hash
        id: sri
        run: |
          HASH=$(openssl dgst -sha384 -binary dist/vocadesk.min.js | openssl base64 -A)
          echo "sri=sha384-${HASH}" >> "$GITHUB_OUTPUT"
          echo "Computed SRI: sha384-${HASH}"

      # Publish to the `gh-pages` branch under embed/v{VERSION}/. GitHub Pages
      # serves the branch root at cdn.vocadesk.com (custom domain set in repo
      # Settings → Pages). Versioned paths are immutable forever — customers
      # pin a specific version + SRI hash.
      - name: Publish to gh-pages branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DIR="$(mktemp -d)"
          git clone --depth 1 --branch gh-pages "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$DIR" 2>/dev/null \
            || { mkdir -p "$DIR/.git" && git -C "$DIR" init -b gh-pages -q && git -C "$DIR" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"; }

          # Custom domain pin — only the first deploy creates it.
          echo "cdn.vocadesk.com" > "$DIR/CNAME"

          # Versioned, immutable bundle path.
          TARGET="$DIR/embed/v${VERSION}"
          mkdir -p "$TARGET"
          cp dist/vocadesk.min.js     "$TARGET/vocadesk.min.js"
          cp dist/vocadesk.min.js.map "$TARGET/vocadesk.min.js.map"

          # Tiny index so visiting / on the apex doesn't 404.
          cat > "$DIR/index.html" <<HTML
          <!doctype html><meta charset=utf-8><title>Vocadesk embed-sdk</title>
          <h1>Vocadesk embed-sdk</h1>
          <p>Versioned, immutable JS bundles served from this domain.</p>
          <p>Latest: <code>https://cdn.vocadesk.com/embed/v${VERSION}/vocadesk.min.js</code></p>
          <p>Source: <a href="https://github.com/${GITHUB_REPOSITORY}">github.com/${GITHUB_REPOSITORY}</a></p>
          HTML

          cd "$DIR"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish v${VERSION}" || { echo "nothing to commit"; exit 0; }
          git push origin gh-pages

      - name: Print URL for release notes
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release v${{ steps.version.outputs.version }}

          **CDN URL**
          \`\`\`
          https://cdn.vocadesk.com/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js
          \`\`\`

          **SRI hash**
          \`\`\`
          ${{ steps.sri.outputs.sri }}
          \`\`\`

          **Snippet**
          \`\`\`html
          <script
            src="https://cdn.vocadesk.com/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js"
            integrity="${{ steps.sri.outputs.sri }}"
            crossorigin="anonymous"
            defer
          ></script>
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## CDN URL

            ```
            https://cdn.vocadesk.com/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js
            ```

            ## SRI hash

            ```
            ${{ steps.sri.outputs.sri }}
            ```

            ## Snippet

            ```html
            <script
              src="https://cdn.vocadesk.com/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js"
              integrity="${{ steps.sri.outputs.sri }}"
              crossorigin="anonymous"
              defer
            ></script>
            ```
          files: |
            dist/vocadesk.min.js
            dist/vocadesk.min.js.map
