name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Resolve version from tag
        id: version
        run: |
          # Strip leading "v"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Bake API + WSS URLs into the bundle. If the secrets aren't set, Vite
      # falls back to the production defaults in src/config.ts (https://embed.vocadesk.com).
      # Set these secrets to override (e.g. while DNS is still pointing at raw Cloud Run URLs).
      - name: Build
        env:
          VITE_API_URL: ${{ secrets.SDK_BUILD_API_URL }}
          VITE_WSS_URL: ${{ secrets.SDK_BUILD_WSS_URL }}
        run: npm run build

      - name: Bundle size check
        run: node scripts/check-size.mjs

      - name: Compute SRI hash
        id: sri
        run: |
          HASH=$(openssl dgst -sha384 -binary dist/vocadesk.min.js | openssl base64 -A)
          echo "sri=sha384-${HASH}" >> "$GITHUB_OUTPUT"
          echo "Computed SRI: sha384-${HASH}"

      # Upload via the Cloudflare R2 REST API directly. Secrets needed:
      #   CLOUDFLARE_API_TOKEN — token with "Workers R2 Storage:Edit"
      #   CLOUDFLARE_ACCOUNT_ID — account id (from dashboard URL)
      #   R2_BUCKET_NAME — e.g. "vocadesk-embed-sdk"
      #
      # The REST endpoint (PUT /accounts/{id}/r2/buckets/{name}/objects/{key})
      # works with the same token used for everything else — no extra
      # User Details:Read permission that wrangler insists on, and no
      # S3-compatible access key minting (which needs Account Settings:Edit).
      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${R2_BUCKET}/objects"
          PREFIX="embed/v${VERSION}"
          upload() {
            local file="$1"; local key="$2"; local ctype="$3"
            local code
            code=$(curl -sS -o /tmp/r2.body -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: ${ctype}" \
              -H "Cache-Control: public, max-age=31536000, immutable" \
              --data-binary "@${file}" \
              "${BASE}/${key}")
            if [[ "$code" != "200" && "$code" != "201" ]]; then
              echo "Upload failed for ${key}: HTTP ${code}"
              cat /tmp/r2.body
              exit 1
            fi
            echo "Uploaded ${key}"
          }
          upload dist/vocadesk.min.js "${PREFIX}/vocadesk.min.js" "application/javascript"
          upload dist/vocadesk.min.js.map "${PREFIX}/vocadesk.min.js.map" "application/json"

      - name: Print SRI hash + URL for release notes
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release v${{ steps.version.outputs.version }}

          **CDN URL**
          \`\`\`
          https://pub-244bc90b117f495090f892d654218952.r2.dev/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js
          \`\`\`

          **SRI hash**
          \`\`\`
          ${{ steps.sri.outputs.sri }}
          \`\`\`

          **Snippet**
          \`\`\`html
          <script
            src="https://pub-244bc90b117f495090f892d654218952.r2.dev/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js"
            integrity="${{ steps.sri.outputs.sri }}"
            crossorigin="anonymous"
            defer
          ></script>
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## CDN URL

            ```
            https://pub-244bc90b117f495090f892d654218952.r2.dev/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js
            ```

            ## SRI hash

            ```
            ${{ steps.sri.outputs.sri }}
            ```

            ## Snippet

            ```html
            <script
              src="https://pub-244bc90b117f495090f892d654218952.r2.dev/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js"
              integrity="${{ steps.sri.outputs.sri }}"
              crossorigin="anonymous"
              defer
            ></script>
            ```
          files: |
            dist/vocadesk.min.js
            dist/vocadesk.min.js.map
