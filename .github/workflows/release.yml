name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Resolve version from tag
        id: version
        run: |
          # Strip leading "v"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: node scripts/check-size.mjs

      - name: Compute SRI hash
        id: sri
        run: |
          HASH=$(openssl dgst -sha384 -binary dist/vocadesk.min.js | openssl base64 -A)
          echo "sri=sha384-${HASH}" >> "$GITHUB_OUTPUT"
          echo "Computed SRI: sha384-${HASH}"

      # Upload via wrangler. Single secret needed:
      #   CLOUDFLARE_API_TOKEN — a token with "Workers R2 Storage:Edit" scope
      #   R2_BUCKET_NAME       — bucket name (e.g. "vocadesk-embed-sdk")
      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PREFIX="embed/v${VERSION}"
          npx --yes wrangler@4 r2 object put \
            "${R2_BUCKET}/${PREFIX}/vocadesk.min.js" \
            --file dist/vocadesk.min.js \
            --remote \
            --content-type "application/javascript" \
            --cache-control "public, max-age=31536000, immutable"
          npx --yes wrangler@4 r2 object put \
            "${R2_BUCKET}/${PREFIX}/vocadesk.min.js.map" \
            --file dist/vocadesk.min.js.map \
            --remote \
            --content-type "application/json" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Print SRI hash + URL for release notes
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Release v${{ steps.version.outputs.version }}

          **CDN URL**
          \`\`\`
          https://pub-244bc90b117f495090f892d654218952.r2.dev/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js
          \`\`\`

          **SRI hash**
          \`\`\`
          ${{ steps.sri.outputs.sri }}
          \`\`\`

          **Snippet**
          \`\`\`html
          <script
            src="https://pub-244bc90b117f495090f892d654218952.r2.dev/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js"
            integrity="${{ steps.sri.outputs.sri }}"
            crossorigin="anonymous"
            defer
          ></script>
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: |
            ## CDN URL

            ```
            https://pub-244bc90b117f495090f892d654218952.r2.dev/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js
            ```

            ## SRI hash

            ```
            ${{ steps.sri.outputs.sri }}
            ```

            ## Snippet

            ```html
            <script
              src="https://pub-244bc90b117f495090f892d654218952.r2.dev/embed/v${{ steps.version.outputs.version }}/vocadesk.min.js"
              integrity="${{ steps.sri.outputs.sri }}"
              crossorigin="anonymous"
              defer
            ></script>
            ```
          files: |
            dist/vocadesk.min.js
            dist/vocadesk.min.js.map
